name: EAS Mobile Builds

on:
  workflow_dispatch:
    inputs:
      platform:
        description: Platform to build
        type: choice
        required: true
        default: android
        options:
          - android
          - ios
          - all
      profile:
        description: EAS build profile
        type: choice
        required: true
        default: staging
        options:
          - development
          - preview
          - staging
          - production

jobs:
  android_apk:
    name: Android APK
    runs-on: ubuntu-latest
    if: ${{ inputs.platform == 'android' || inputs.platform == 'all' }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npm run typecheck

      - name: Build Android APK
        run: eas build --platform android --profile ${{ inputs.profile }} --non-interactive --wait

  ios_build:
    name: iOS Build
    runs-on: ubuntu-latest
    if: ${{ inputs.platform == 'ios' || inputs.platform == 'all' }}
    permissions:
      contents: read
    defaults:
      run:
        working-directory: mobile
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: mobile/package-lock.json

      - name: Setup EAS
        uses: expo/expo-github-action@v8
        with:
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      - name: Install dependencies
        run: npm ci --legacy-peer-deps

      - name: Typecheck
        run: npm run typecheck

      - name: Build iOS
        run: eas build --platform ios --profile ${{ inputs.profile }} --non-interactive --wait
